<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sinh Nhật Đáng Yêu - Happy Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="stylesheet" href="../../assets/css/animation.css">
  
  <style>
    :root {
      --bd-primary: #ff84b2;
      --bd-secondary: #ffc6d9;
      --bd-bg: #fff1f6;
      --bd-text: #5c3a45;
    }
    body.template-shell {
      font-family: 'Quicksand', sans-serif;
    }
    .mobile-app-container {
      background: linear-gradient(135deg, var(--bd-bg) 0%, #ffffff 100%);
      color: var(--bd-text);
      overflow: hidden;
      position: relative;
    }
    .mobile-app-container::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 200px; height: 200px;
      background: var(--bd-secondary);
      border-radius: 50%;
      filter: blur(40px);
      z-index: 0;
      opacity: 0.6;
    }
    .mobile-app-container::after {
      content: '';
      position: absolute;
      bottom: 100px; left: -50px;
      width: 150px; height: 150px;
      background: var(--bd-primary);
      border-radius: 50%;
      filter: blur(50px);
      z-index: 0;
      opacity: 0.4;
    }
    .topbar {
      background: rgba(255, 241, 246, 0.8) !important;
      backdrop-filter: blur(10px);
      border-bottom: 2px dashed var(--bd-secondary) !important;
      z-index: 10;
    }
    h1, h2, h3, .bd-title {
      font-family: 'Baloo 2', cursive;
      color: var(--bd-primary);
    }
    .hero-section {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    .hero-title {
      font-size: 3rem;
      line-height: 1.1;
      text-shadow: 2px 2px 0px #fff, 4px 4px 0px var(--bd-secondary);
      margin-bottom: 15px;
      animation: float 3s ease-in-out infinite;
    }
    .hero-subtitle {
      font-size: 1.1rem;
      font-weight: 600;
      background: var(--bd-primary);
      color: #fff;
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(255, 132, 178, 0.3);
    }
    .images-container {
      position: relative;
      z-index: 1;
      padding: 0 15px;
    }
    .image-block {
      border: 8px solid #fff;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(255, 132, 178, 0.15);
      transform: rotate(-2deg);
      transition: transform 0.3s;
      margin-bottom: 30px;
    }
    .image-block:nth-child(even) {
      transform: rotate(2deg);
    }
    .image-block:hover {
      transform: scale(1.02) rotate(0deg);
    }
    .img-placeholder {
      background: linear-gradient(45deg, #ffe0ec, #fff);
      color: var(--bd-primary);
      font-weight: bold;
    }
    .message-card {
      background: #fff;
      border-radius: 30px;
      padding: 30px;
      margin: 20px 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      position: relative;
      z-index: 1;
      border: 2px solid var(--bd-secondary);
      text-align: center;
    }
    .message-card i {
      font-size: 2rem;
      color: var(--bd-primary);
      margin-bottom: 15px;
    }
    .message-card p {
      font-size: 1.05rem;
      line-height: 1.7;
    }
    .btn-back {
      background: var(--bd-primary);
      color: #fff !important;
      border-radius: 50px;
      padding: 12px 30px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(255, 132, 178, 0.4);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      position: relative;
      z-index: 1;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body class="template-shell mobile-mode">
  <div class="mobile-app-container">
    <header class="topbar">
      <div class="container-wide">
        <div class="nav-shell position-relative" style="justify-content:center;">
          <strong class="bd-title ms-2" style="font-size: 1.3rem;">🎂 Birthday Joy</strong>
        </div>
      </div>
    </header>

    <main class="pb-5">
      <div class="hero-section" data-aos="zoom-in">
        <h1 class="hero-title">Happy<br>Birthday!</h1>
        <div class="hero-subtitle">Chúc bạn một ngày tuyệt vời 💖</div>
      </div>

      <div class="images-container" data-aos="fade-up" data-aos-delay="100">
        <div class="dynamic-img" data-img="img1"></div>
        <div class="dynamic-img" data-img="img2"></div>
      </div>

      <div class="message-card" data-aos="fade-up">
        <i class="fa-solid fa-gift"></i>
        <h3>Gửi ngàn lời chúc</h3>
        <p>Tuổi mới mong bạn luôn vui vẻ, hạnh phúc, đạt được mọi ước mơ và luôn xinh đẹp rạng ngời như bây giờ nhé! Mãi mãi tuổi 18!</p>
      </div>

      <div class="images-container" data-aos="fade-up">
        <div class="dynamic-img" data-img="img3"></div>
      </div>
      
      <div class="text-center mt-5 mb-3" data-aos="fade-up">
        <a class="btn-back" href="../../index.html">
           <i class="fa-solid fa-arrow-left"></i> Quay lại Home
        </a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="../../assets/js/app.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".dynamic-img").forEach(container => {
        const key = container.getAttribute("data-img");
        const src = PAGE_IMAGES[key];
        if (src && src.trim() !== "") {
          container.innerHTML = `<div class="image-block"><img src="${src}" alt="Ảnh chi tiết"></div>`;
        } else {
          container.innerHTML = `<div class="image-block img-placeholder"><span>Chưa có ảnh (${key})</span></div>`;
        }
      });
    });
  </script>
</body>
</html>
