<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tình Yêu Lãng Mạn - Happy Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="stylesheet" href="../../assets/css/animation.css">
  
  <script>
    const PAGE_IMAGES = {
      "img1": "",
      "img2": "",
      "img3": ""
    };
  </script>
  <style>
    :root {
      --lv-primary: #d62828;
      --lv-bg: #fff0f3;
      --lv-text: #4a1520;
    }
    body.template-shell {
      font-family: 'Lora', serif;
      background: #fdfdfd;
    }
    .mobile-app-container {
      background: linear-gradient(to bottom, #ffccd5, var(--lv-bg), #ffffff);
      color: var(--lv-text);
      overflow: hidden;
      position: relative;
    }
    .topbar {
      background: transparent !important;
      border-bottom: none !important;
      padding-top: 15px;
    }
    .nav-shell strong {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      color: var(--lv-primary);
    }
    .hero-section {
      text-align: center;
      padding: 30px 20px 50px;
      position: relative;
      z-index: 1;
    }
    .hero-title {
      font-family: 'Dancing Script', cursive;
      font-size: 4rem;
      line-height: 1;
      color: var(--lv-primary);
      margin-bottom: 10px;
    }
    .heart-divider {
      color: var(--lv-primary);
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }
    .heart-divider::before, .heart-divider::after {
      content: '';
      height: 1px;
      width: 50px;
      background: var(--lv-primary);
      opacity: 0.5;
    }
    .images-container {
      padding: 0 25px;
    }
    .image-block {
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(214, 40, 40, 0.15);
      margin-bottom: 35px;
      position: relative;
    }
    .image-block::before {
      content: '♥';
      position: absolute;
      top: -15px;
      right: -15px;
      font-size: 2.5rem;
      color: var(--lv-primary);
      transform: rotate(15deg);
    }
    .image-block img {
      border-radius: 5px;
    }
    .message-card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(214, 40, 40, 0.2);
      border-radius: 15px;
      padding: 30px 20px;
      margin: 20px;
      text-align: center;
      font-style: italic;
    }
    .message-card p {
      font-size: 1.15rem;
      line-height: 1.8;
      margin: 0;
    }
    .btn-back {
      background: #fff;
      color: var(--lv-primary) !important;
      border: 1px solid var(--lv-primary);
      border-radius: 30px;
      padding: 10px 30px;
      font-weight: bold;
      text-decoration: none;
      transition: all 0.3s;
      display: inline-block;
    }
    .btn-back:hover {
      background: var(--lv-primary);
      color: #fff !important;
    }
  </style>
</head>
<body class="template-shell mobile-mode">
  <div class="mobile-app-container">
    <header class="topbar">
      <div class="container-wide">
        <div class="nav-shell position-relative" style="justify-content:center;">
          <strong>My Love</strong>
        </div>
      </div>
    </header>

    <main class="pb-5">
      <div class="hero-section" data-aos="fade-down">
        <h1 class="hero-title">I Love You</h1>
        <div class="heart-divider"><i class="fa-solid fa-heart"></i></div>
        <p style="font-size: 1.1rem; opacity: 0.8;">Hơn cả hôm qua, ít hơn ngày mai.</p>
      </div>

      <div class="images-container" data-aos="fade-up">
        <div class="dynamic-img" data-img="img1"></div>
      </div>

      <div class="message-card" data-aos="zoom-in">
        <p>"Tình yêu không phải là nhìn chằm chằm vào nhau, mà là cùng nhau nhìn về một hướng. Cảm ơn em đã đến và làm cho cuộc sống của anh thêm trọn vẹn và ý nghĩa hơn bao giờ hết."</p>
      </div>
      
      <div class="images-container" data-aos="fade-up">
        <div class="dynamic-img" data-img="img2"></div>
        <div class="dynamic-img" data-img="img3"></div>
      </div>

      <div class="text-center mt-5 mb-3" data-aos="fade-up">
        <a class="btn-back" href="../../index.html">
           <i class="fa-solid fa-arrow-left"></i> Về trang chủ
        </a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".dynamic-img").forEach(container => {
        const key = container.getAttribute("data-img");
        const src = PAGE_IMAGES[key];
        if (src && src.trim() !== "") {
          container.innerHTML = `<div class="image-block"><img src="${src}" alt="Ảnh chi tiết"></div>`;
        } else {
          container.innerHTML = `<div class="image-block img-placeholder" style="aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;background:#ffe5ec;color:#d62828;"><span>Chưa có ảnh (${key})</span></div>`;
        }
      });
    });
  </script>
</body>
</html>
