  <script>
    const PAGE_IMAGES = {
      "img1": "https://images.pexels.com/photos/34066269/pexels-photo-34066269.jpeg?auto=compress&cs=tinysrgb&h=650&w=940",
      "img2": "https://images.pexels.com/photos/16180590/pexels-photo-16180590.jpeg?auto=compress&cs=tinysrgb&h=650&w=940",
      "img3": "https://images.pexels.com/photos/17400171/pexels-photo-17400171.jpeg?auto=compress&cs=tinysrgb&h=650&w=940"
    };
  </script>
  <style>
    :root {
      --bd-primary: #34a0a4;
      --bd-secondary: #d9ed92;
      --bd-bg: #f1faee;
      --bd-text: #1a535c;
    }
    body.template-shell {
      font-family: 'Nunito', sans-serif;
      background-color: #e5f6f1;
    }
    .mobile-app-container {
      background: linear-gradient(180deg, var(--bd-bg) 0%, #ffffff 100%);
      color: var(--bd-text);
      overflow: hidden;
      position: relative;
      border-radius: 30px; /* cong thêm cho mượt */
    }
    .mobile-app-container::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 250px; height: 250px;
      background: var(--bd-secondary);
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      opacity: 0.5;
    }
    .topbar {
      background: rgba(241, 250, 238, 0.8) !important;
      backdrop-filter: blur(10px);
      border-bottom: 0 !important;
      z-index: 10;
    }
    h1, h2, h3, .bd-title {
      font-family: 'Comfortaa', cursive;
      color: var(--bd-primary);
    }
    .hero-section {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    .hero-title {
      font-size: 2.5rem;
      line-height: 1.2;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .hero-subtitle {
      font-size: 1rem;
      background: var(--bd-secondary);
      color: var(--bd-primary);
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;
    }
    .images-container {
      position: relative;
      z-index: 1;
      padding: 0 15px;
    }
    .image-block {
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(52, 160, 164, 0.15);
      margin-bottom: 25px;
      overflow: hidden;
    }
    .img-placeholder {
      background: #e8f4f2;
      color: var(--bd-primary);
      font-weight: bold;
    }
    .message-card {
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      margin: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      position: relative;
      z-index: 1;
      text-align: center;
      border-left: 5px solid var(--bd-primary);
    }
    .message-card i {
      font-size: 2rem;
      color: var(--bd-primary);
      margin-bottom: 10px;
    }
    .message-card p {
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .btn-back {
      background: var(--bd-primary);
      color: #fff !important;
      border-radius: 50px;
      padding: 12px 30px;
      font-family: 'Comfortaa', cursive;
      font-weight: 700;
      box-shadow: 0 8px 15px rgba(52, 160, 164, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      position: relative;
      z-index: 1;
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Thiệp Chúc Sức Khỏe, Sớm Bình Phục 🌿",
    "description": "Mẫu thiệp chúc sức khỏe nhẹ nhàng, bình yên với sắc xanh thư giãn. Gửi năng lượng tích cực và lời chúc mau chóng bình phục đến người thân, bạn bè."
  }
  </script>
</head>
<body class="template-shell mobile-mode">
  <div class="mobile-app-container">
    <header class="topbar">
      <div class="container-wide">
        <div class="nav-shell position-relative" style="justify-content:center;">
          <strong class="bd-title ms-2" style="font-size: 1.2rem;">Get Well Soon</strong>
        </div>
      </div>
    </header>

    <main class="pb-5">
      <div class="hero-section" data-aos="zoom-in">
        <h1 class="hero-title">Mau Khỏe Nhé!</h1>
        <div class="hero-subtitle">Gửi năng lượng tích cực 🌿</div>
      </div>

      <div class="images-container" data-aos="fade-up" data-aos-delay="100">
        <div class="dynamic-img" data-img="img1"></div>
      </div>

      <div class="message-card" data-aos="fade-up">
        <i class="fa-solid fa-seedling"></i>
        <p>Chúc bạn mau chóng bình phục và lấy lại sức khỏe. Nhớ nghỉ ngơi nhiều và ăn uống đầy đủ nhé. Mọi người đều đang mong bạn sớm khỏe lại đấy!</p>
      </div>
      
      <div class="images-container" data-aos="fade-up">
        <div class="dynamic-img" data-img="img2"></div>
      </div>

      <div class="text-center mt-5 mb-3" data-aos="fade-up">
        <a class="btn-back" href="../../index.html">
           <i class="fa-solid fa-arrow-left"></i> Về Trang chủ
        </a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="../../assets/js/app.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".dynamic-img").forEach(container => {
        const key = container.getAttribute("data-img");
        const src = PAGE_IMAGES[key];
        if (src && src.trim() !== "") {
          container.innerHTML = `<div class="image-block"><img src="${src}" alt="Thiệp chúc sức khỏe sớm bình phục - ${key}"></div>`;
        } else {
          container.innerHTML = `<div class="image-block img-placeholder"><span>Chưa có ảnh (${key})</span></div>`;
        }
      });
    });
  </script>
</body>
</html>
