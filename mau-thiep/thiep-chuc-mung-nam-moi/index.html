    .message-card {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(0,0,0,0));

<body class="template-shell mobile-mode">
  <div class="mobile-app-container">
    <header class="topbar">
      <div class="container-wide">
        <div class="nav-shell position-relative" style="justify-content:center;">
          <strong>Celebration</strong>
        </div>
      </div>
    </header>

    <main class="pb-5">
      <div class="hero-section" data-aos="fade-down">
        <div class="year-badge">2026</div>
        <h1 class="hero-title">Happy New Year</h1>
        <p style="font-family: sans-serif; color: #aaa;">Khởi đầu mới, thành công mới.</p>
      </div>

      <div class="images-container" data-aos="fade-up">
        <div class="dynamic-img" data-img="img1"></div>
      </div>

      <div class="message-card" data-aos="zoom-in">
        <h3>Chúc Mừng Năm Mới</h3>
        <p>Năm mới chúc gia đình an khang thịnh vượng, vạn sự như ý, sức khỏe dồi dào, ngập tràn niềm vui và hạnh phúc.</p>

        <div class="dynamic-img" data-img="img3"></div>

           Trở về

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".dynamic-img").forEach(container => {
        const key = container.getAttribute("data-img");
        const src = PAGE_IMAGES[key];
        if (src && src.trim() !== "") {
          container.innerHTML = `<div class="image-block"><img src="${src}" alt="Thiệp chúc Tết năm mới rực rỡ - ${key}"></div>`;
        } else {
          container.innerHTML = `<div class="image-block img-placeholder" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#1e293b;color:#f59e0b;"><span>Chưa có ảnh (${key})</span></div>`;
        }
      });
    });
  </script>
