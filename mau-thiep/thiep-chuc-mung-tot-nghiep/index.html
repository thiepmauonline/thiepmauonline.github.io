  <script>
    const PAGE_IMAGES = {
      "img1": "https://images.pexels.com/photos/8093033/pexels-photo-8093033.jpeg?auto=compress&cs=tinysrgb&h=650&w=940",
      "img2": "https://images.pexels.com/photos/7842670/pexels-photo-7842670.jpeg?auto=compress&cs=tinysrgb&h=650&w=940",
      "img3": "https://images.pexels.com/photos/7842648/pexels-photo-7842648.jpeg?auto=compress&cs=tinysrgb&h=650&w=940"
    };
  </script>
  <style>
    :root {
      --gr-primary: #1e3a8a; /* Navy blue */
      --gr-gold: #fbbf24;    /* Academic Gold */
      --gr-bg: #f8fafc;
      --gr-text: #334155;
    }
    body.template-shell {
      font-family: 'Open Sans', sans-serif;
      background: #e2e8f0;
    }
    .mobile-app-container {
      background: var(--gr-bg);
      color: var(--gr-text);
      overflow: hidden;
      position: relative;
    }
    .mobile-app-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 250px;
      background: var(--gr-primary);
      z-index: 0;
      border-bottom-left-radius: 50% 20px;
      border-bottom-right-radius: 50% 20px;
      box-shadow: 0 10px 30px rgba(30, 58, 138, 0.2);
    }
    .topbar {
      background: transparent !important;
      border-bottom: none !important;
      position: relative;
      z-index: 10;
    }
    .nav-shell strong {
      color: #fff;
      font-family: 'Merriweather', serif;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .hero-section {
      text-align: center;
      padding: 40px 20px 20px;
      position: relative;
      z-index: 1;
      color: #fff;
    }
    .hero-icon {
      font-size: 3.5rem;
      color: var(--gr-gold);
      margin-bottom: 15px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }
    .hero-title {
      font-family: 'Merriweather', serif;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .images-container {
      padding: 0 20px;
      position: relative;
      z-index: 2;
      margin-top: -20px;
    }
    .image-block {
      background: #fff;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .image-block img {
      border-radius: 8px;
    }
    .message-card {
      background: #fff;
      border-left: 5px solid var(--gr-gold);
      padding: 30px 20px;
      margin: 30px 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border-radius: 8px;
    }
    .message-card h3 {
      font-family: 'Merriweather', serif;
      color: var(--gr-primary);
      font-size: 1.5rem;
      margin-bottom: 15px;
    }
    .message-card p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--gr-text);
      margin: 0;
    }
    .btn-back {
      background: var(--gr-primary);
      color: #fff !important;
      border-radius: 8px;
      padding: 12px 30px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 5px 15px rgba(30, 58, 138, 0.3);
    }
    .btn-back:hover {
      background: #152c6b;
      transform: translateY(-2px);
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Thiệp Chúc Mừng Tốt Nghiệp Ý Nghĩa 🎓",
    "description": "Mẫu thiệp chúc mừng tốt nghiệp trang trọng, vinh danh thành quả học tập. Tùy chỉnh lời động viên, chia sẻ niềm tự hào đến bạn bè và người thân trong ngày lễ."
  }
  </script>
</head>
<body class="template-shell mobile-mode">
  <div class="mobile-app-container">
    <header class="topbar">
      <div class="container-wide">
        <div class="nav-shell position-relative" style="justify-content:center;">
          <strong>Class of 2026</strong>
        </div>
      </div>
    </header>

    <main class="pb-5">
      <div class="hero-section" data-aos="fade-down">
        <div class="hero-icon">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h1 class="hero-title">Happy Graduation!</h1>
        <p style="font-size: 1.1rem; opacity: 0.9;">Hành trình mới bắt đầu</p>
      </div>

      <div class="images-container" data-aos="fade-up">
        <div class="dynamic-img" data-img="img1"></div>
      </div>

      <div class="message-card" data-aos="fade-right">
        <h3>Chúc mừng tốt nghiệp</h3>
        <p>Chúc mừng bạn đã hoàn thành xuất sắc chặng đường học tập. Phía trước là một bầu trời rộng lớn, hãy bay cao và vươn xa với những ước mơ của mình. Tự hào về bạn!</p>
      </div>
      
      <div class="images-container" data-aos="fade-up">
        <div class="dynamic-img" data-img="img2"></div>
        <div class="dynamic-img" data-img="img3"></div>
      </div>

      <div class="text-center mt-5 mb-4" data-aos="fade-up">
        <a class="btn-back" href="../../index.html">
           <i class="fa-solid fa-house"></i> Về trang chủ
        </a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".dynamic-img").forEach(container => {
        const key = container.getAttribute("data-img");
        const src = PAGE_IMAGES[key];
        if (src && src.trim() !== "") {
          container.innerHTML = `<div class="image-block"><img src="${src}" alt="Thiệp chúc mừng tốt nghiệp - ${key}"></div>`;
        } else {
          container.innerHTML = `<div class="image-block img-placeholder" style="aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#e2e8f0;color:#1e3a8a;font-weight:600;border-radius:8px;"><span>Chưa có ảnh (${key})</span></div>`;
        }
      });
    });
  </script>
</body>
</html>
