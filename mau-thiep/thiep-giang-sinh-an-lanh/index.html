  <style>
    :root {
      --bd-primary: #d42426;
      --bd-secondary: #0f5132;
      --bd-gold: #f8b12f;
      --bd-bg: #0b2e13;
      --bd-text: #ffffff;
    }
    body.template-shell {
      font-family: 'Nunito', sans-serif;
      background-color: #000;
    }
    .mobile-app-container {
      background: radial-gradient(circle at top, #1a4224 0%, var(--bd-bg) 100%);
      color: var(--bd-text);
      overflow: hidden;
      position: relative;
    }
    /* Snow effect simple */
    .mobile-app-container::before {
      content: '❄ ❅ ❄ ❅ ❄';
      position: absolute;
      top: -20px; left: 0; right: 0;
      color: rgba(255,255,255,0.1);
      font-size: 3rem;
      letter-spacing: 50px;
      animation: snowfall 10s linear infinite;
      white-space: nowrap;
      z-index: 0;
    }
    @keyframes snowfall {
      0% { transform: translateY(-100px); }
      100% { transform: translateY(100vh); }
    }
    .topbar {
      background: rgba(11, 46, 19, 0.8) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--bd-secondary) !important;
      z-index: 10;
    }
    h1, h2, h3, .bd-title {
      font-family: 'Mountains of Christmas', cursive;
      color: var(--bd-gold);
    }
    .hero-section {
      text-align: center;
      padding: 60px 20px 30px;
      position: relative;
      z-index: 1;
    }
    .hero-title {
      font-size: 3.5rem;
      line-height: 1;
      text-shadow: 0 4px 15px rgba(248, 177, 47, 0.4);
      margin-bottom: 20px;
      color: var(--bd-primary);
    }
    .hero-subtitle {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .images-container {
      position: relative;
      z-index: 1;
      padding: 0 20px;
    }
    .image-block {
      border: 4px solid var(--bd-gold);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      margin-bottom: 30px;
      overflow: hidden;
    }
    .img-placeholder {
      background: rgba(255,255,255,0.1);
      color: var(--bd-gold);
      font-weight: bold;
    }
    .message-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(248, 177, 47, 0.3);
      border-radius: 20px;
      padding: 30px;
      margin: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
      text-align: center;
      backdrop-filter: blur(5px);
    }
    .message-card i {
      font-size: 2.5rem;
      color: var(--bd-primary);
      margin-bottom: 15px;
    }
    .message-card p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #eaeaea;
    }
    .btn-back {
      background: var(--bd-primary);
      color: #fff !important;
      border-radius: 50px;
      padding: 12px 30px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(212, 36, 38, 0.4);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      position: relative;
      z-index: 1;
      transition: all 0.3s;
    }
    .btn-back:hover {
      background: var(--bd-gold);
      box-shadow: 0 8px 20px rgba(248, 177, 47, 0.4);
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Thiệp Giáng Sinh An Lành, Ấm Áp 🎄",
    "description": "Thiệp chúc mừng Giáng sinh (Merry Christmas) đẹp mắt với hiệu ứng tuyết rơi lãng mạn. Gửi trọn thông điệp ấm áp, an lành đến những người yêu thương nhất."
  }
  </script>

<body class="template-shell mobile-mode">
  <div class="mobile-app-container">
    <header class="topbar">
      <div class="container-wide">
        <div class="nav-shell position-relative" style="justify-content:center;">
          <strong class="bd-title ms-2" style="font-size: 1.5rem;"><i class="fa-solid fa-holly-berry text-danger"></i> Christmas</strong>
        </div>
      </div>
    </header>

    <main class="pb-5">
      <div class="hero-section" data-aos="fade-down">
        <h1 class="hero-title">Merry<br>Christmas</h1>
        <div class="hero-subtitle">Giáng sinh an lành 🎄</div>
      </div>

      <div class="images-container" data-aos="fade-up" data-aos-delay="100">
        <div class="dynamic-img" data-img="img1"></div>
      </div>

      <div class="message-card" data-aos="fade-up">
        <i class="fa-solid fa-gift"></i>
        <h3>Gửi ngàn yêu thương</h3>
        <p>Chúc bạn và gia đình một mùa Giáng sinh ấm áp, an lành và tràn ngập niềm vui. Cầu mong những điều tốt đẹp nhất sẽ đến với bạn trong năm mới sắp tới!</p>
      </div>
      
      <div class="images-container" data-aos="fade-up">
        <div class="dynamic-img" data-img="img2"></div>
        <div class="dynamic-img" data-img="img3"></div>
      </div>

      <div class="text-center mt-5 mb-3" data-aos="fade-up">
        <a class="btn-back" href="../../index.html">
           <i class="fa-solid fa-arrow-left"></i> Quay lại Home
        </a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="../../assets/js/app.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".dynamic-img").forEach(container => {
        const key = container.getAttribute("data-img");
        const src = PAGE_IMAGES[key];
        if (src && src.trim() !== "") {
          container.innerHTML = `<div class="image-block"><img src="${src}" alt="Thiệp chúc mừng Giáng sinh an lành - ${key}"></div>`;
        } else {
          container.innerHTML = `<div class="image-block img-placeholder"><span>Chưa có ảnh (${key})</span></div>`;
        }
      });
    });
  </script>
</body>
